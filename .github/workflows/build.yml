name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # CORREGIDO: Usar checkout@v4 (la última versión estable)
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "setup.bat;." `
            --add-data "version.dll;." `
            --add-data "config.ini;." `
            --add-data "g_The Sims 3.ini;." `
            --add-data "g_The Sims 4.ini;." `
            unlocker_gui.py

      # CORREGIDO: Usar upload-artifact@v4
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: Kai-Unlocker-Windows
          path: dist/unlocker_gui.exe
